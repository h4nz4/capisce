<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="CAPISCE — same answer, same precision">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141416"/>
      <stop offset="0.55" stop-color="#0C0C0E"/>
      <stop offset="1" stop-color="#17151A"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4EFE6"/>
      <stop offset="1" stop-color="#C9C0AE"/>
    </linearGradient>
    <linearGradient id="brimfelt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8D0BF"/>
      <stop offset="1" stop-color="#EFE9DE"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#F4EFE6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F4EFE6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="18" fill="url(#panel)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="338.5" rx="17.25" fill="none" stroke="#2A2A30" stroke-width="1.5"/>

  <!-- smoke -->
  <g fill="none" stroke="url(#smoke)" stroke-width="5" stroke-linecap="round">
    <path d="M247 152 C266 120, 235 102, 253 74 C266 54, 249 42, 256 28"/>
    <path d="M214 148 C228 126, 208 114, 220 94" stroke-width="3.5"/>
  </g>

  <!-- fedora: brim behind, crown and band on top, front brim edge over the band -->
  <g transform="translate(0 4)">
    <ellipse cx="150" cy="172" rx="112" ry="26" fill="url(#brimfelt)"/>
    <path d="M96 172 C96 132 103 103 119 99 C130 96.5 138 104 150 104 C162 104 170 96.5 181 99 C197 103 204 132 204 172 Z" fill="url(#felt)"/>
    <path d="M97 150 H203 V172 H97 Z" fill="#8E1420"/>
    <path d="M97 150 H203 V157 H97 Z" fill="#000" opacity="0.20"/>
    <path d="M38 172 A112 26 0 0 0 262 172 Z" fill="url(#brimfelt)"/>
    <path d="M38 172 A112 26 0 0 0 262 172" fill="none" stroke="#A79E8C" stroke-width="1.3" opacity="0.5"/>
  </g>

  <!-- wordmark -->
  <text x="318" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="700"
        letter-spacing="15" fill="#F4EFE6">CAPISCE</text>

  <rect x="322" y="212" width="392" height="4" rx="2" fill="#B3121D"/>

  <text x="322" y="258" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="21"
        letter-spacing="4.5" fill="#9A9488">SAME ANSWER. SAME PRECISION.</text>

  <text x="322" y="292" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18"
        letter-spacing="0.8" fill="#6E695F">Now you know from the first word whether it's money — or it took a dirt nap.</text>
</svg>
